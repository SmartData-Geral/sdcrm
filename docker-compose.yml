version: "3.9"

services:
  crm-backend:
    build:
      context: ./backend
    container_name: crm-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8082:8000"

  crm-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/crm/api}
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "3001:80"

